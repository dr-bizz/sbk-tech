<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify form detection</title>
  </head>
  <body>
    <!--
      This static form exists only so Netlify can detect the "contact" form at
      deploy time. The real form is a client-rendered React component that POSTs
      to this file via AJAX. Field names here must match what ContactForm sends.
    -->
    <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
